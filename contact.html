<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact ✦ Nox</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── Contact page-specific styles ── */

    .contact-wrap {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 2rem 4rem;
    }

    .contact-inner {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column;
      align-items: center; gap: 2.5rem;
    }

    .contact-header {
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.8rem;
    }

    .contact-header h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2.5rem, 7vw, 4rem);
      line-height: 1;
      background: linear-gradient(90deg, #f5f0ff 0%, #e879f9 40%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s ease both;
    }

    .contact-header p {
      font-size: 0.95rem; font-weight: 300;
      color: rgba(245,240,255,0.5);
      letter-spacing: 0.04em;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .contact-divider {
      width: 48px; height: 2px; border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #e879f9);
    }

    /* Form */
    .contact-form {
      width: 100%;
      display: flex; flex-direction: column; gap: 1.2rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    .form-group label {
      font-size: 0.75rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(245,240,255,0.45);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(232,121,249,0.18);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 300;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
      /* Fix iOS zoom on focus — keep font-size ≥ 16px equivalent */
      -webkit-appearance: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(245,240,255,0.25);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(232,121,249,0.5);
      background: rgba(124,58,237,0.14);
    }

    .form-group select option {
      background: #1e003a;
      color: var(--white);
    }

    .form-group textarea {
      min-height: 140px;
    }

    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      border-radius: 999px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #e879f9);
      color: #fff;
      box-shadow: 0 0 30px rgba(232,121,249,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
      margin-top: 0.4rem;
      -webkit-appearance: none;
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(232,121,249,0.5);
    }
    .btn-submit:active {
      transform: translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 640px) {
      .contact-wrap {
        padding: 7rem 1.25rem 3rem;
        justify-content: flex-start;
      }
      /* Prevent iOS auto-zoom on input focus */
      .form-group input,
      .form-group textarea,
      .form-group select {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <nav>
    <a class="nav-logo" href="index.html"><img src="whitelogo.png" alt="Doginal Dogs" height="36" style="pointer-events:none;" /></a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="alpharoom.html">Alpha Room Spaces</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="https://market.doginaldogs.com/" target="_blank">Doginal Dogs Market Place</a></li>
      <li><a href="https://doginaldogs.com/join-the-community" target="_blank">Get A Starter Dog</a></li>
    </ul>
  </nav>

  <div class="contact-wrap">
    <div class="contact-inner">

      <div class="contact-header">
        <h1>Contact</h1>
        <p>Send a message and I'll get back to you.</p>
        <div class="contact-divider"></div>
      </div>

      <form class="contact-form" action="https://formspree.io/f/mwvwodkv" method="POST">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <label for="subject">What are you writing about?</label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>Select a topic</option>
            <option value="Collaboration">Collaboration</option>
            <option value="NFT Project">NFT Project</option>
            <option value="Alpha Room">Alpha Room</option>
            <option value="Press / Media">Press / Media</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind..." required></textarea>
        </div>

        <input type="hidden" name="_replyto" value="noxismeta@gmail.com" />

        <button type="submit" class="btn-submit">Send Message ✦</button>

      </form>

    </div>
  </div>

  <script>
    // Hamburger
    const toggle   = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
