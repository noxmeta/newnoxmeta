<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact ✦ Nox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    :root {
      --purple:  #7c3aed;
      --mid:     #4c1d95;
      --dark:    #07000d;
      --white:   #f5f0ff;
      --accent:  #e879f9;
      --accent2: #67e8f9;
      --glass:   rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--dark); }

    .bg {
      background:
        radial-gradient(ellipse 70% 50% at 15% 0%, #3b1a6e55 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, #2d0f5244 0%, transparent 55%),
        linear-gradient(170deg, #140028 0%, #0c001e 45%, #07000d 100%);
    }
    .blob { opacity: 0.18; }
    .blob-1 { background: #6d28d9; }
    .blob-2 { background: #a855f7; }
    .blob-3 { display: none; }

    /* ── Nav ── */
    nav {
      padding: 1.2rem 4rem;
      background: rgba(7,0,13,0.7);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo img { height: 32px; }
    .nav-links a { font-size: 0.78rem; letter-spacing: 0.12em; }

    /* ── Contact layout ── */
    .contact-wrap {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 2rem 5rem;
    }

    .contact-inner {
      width: 100%; max-width: 560px;
      display: flex; flex-direction: column;
      align-items: center; gap: 2.5rem;
    }

    /* ── Header ── */
    .contact-header {
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.8rem;
    }

    .contact-eyebrow {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
      animation: fadeUp 0.6s ease both;
    }
    .eyebrow-line {
      display: inline-block; width: 28px; height: 1px;
      background: var(--accent); border-radius: 999px;
    }

    .contact-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 4.2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--white);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .contact-header h1 span {
      background: linear-gradient(135deg, #e879f9, #a78bfa 50%, #67e8f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .contact-header p {
      font-size: 0.95rem; font-weight: 300;
      color: rgba(245,240,255,0.45);
      letter-spacing: 0.04em;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .contact-divider {
      width: 48px; height: 2px; border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #e879f9);
    }

    /* ── Form card ── */
    .contact-form-wrap {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .contact-form {
      display: flex; flex-direction: column; gap: 1.2rem;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    .form-group label {
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(245,240,255,0.4);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(124,58,237,0.07);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 300;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
      -webkit-appearance: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(245,240,255,0.2);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(168,85,247,0.45);
      background: rgba(124,58,237,0.12);
    }

    .form-group select option {
      background: #0c001e;
      color: var(--white);
    }

    .form-group textarea {
      min-height: 140px;
    }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 0.4rem;
      -webkit-appearance: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124,58,237,0.5);
    }
    .btn-submit:active { transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      nav { padding: 1rem 1.4rem; }
      .contact-wrap {
        padding: 7rem 1.25rem 3rem;
        justify-content: flex-start;
      }
      .contact-form-wrap { padding: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .form-group input,
      .form-group textarea,
      .form-group select { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="whitelogo.png" alt="Noxismeta" height="32" style="pointer-events:none;" />
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="https://market.doginaldogs.com/" target="_blank">DD Marketplace</a></li>
      <li><a href="https://doginaldogs.com/join-the-community" target="_blank">Get A Starter Dog</a></li>
    </ul>
  </nav>

  <div class="contact-wrap">
    <div class="contact-inner">

      <div class="contact-header">
        <div class="contact-eyebrow"><span class="eyebrow-line"></span>Get In Touch</div>
        <h1>Let's <span>Talk</span></h1>
        <p>Send a message and I'll get back to you.</p>
        <div class="contact-divider"></div>
      </div>

      <div class="contact-form-wrap">
        <form class="contact-form" action="https://formspree.io/f/mwvwodkv" method="POST">

          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="subject">What are you writing about?</label>
            <select id="subject" name="subject" required>
              <option value="" disabled selected>Select a topic</option>
              <option value="NFT Project">NFT Project</option>
              <option value="Brand Deal">Brand Deal</option>
              <option value="Strategic Collab">Strategic Collab</option>
              <option value="Press / Media">Press / Media</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your project or idea..." required></textarea>
          </div>

          <input type="hidden" name="_replyto" value="noxismeta@gmail.com" />

          <button type="submit" class="btn-submit">
            Send Message
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>

        </form>
      </div>

    </div>
  </div>

  <script>
    const toggle   = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
