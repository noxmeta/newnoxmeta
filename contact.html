<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact ✦ Nox</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:  #7c3aed;
      --dark:    #0a000f;
      --white:   #f5f0ff;
      --accent:  #e879f9;
      --accent2: #67e8f9;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #6d28d9aa 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, #4c1d9588 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 55% 40%, #7c3aed44 0%, transparent 50%),
        linear-gradient(160deg, #3b0764 0%, #1e003a 40%, #0a000f 100%);
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(70px); opacity: 0.35; z-index: 0;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: #7c3aed; top: -100px; left: -80px; }
    .blob-2 { width: 300px; height: 300px; background: #e879f9; top: 30%; right: -60px; animation-delay: -4s; }
    .blob-3 { width: 260px; height: 260px; background: #67e8f9; bottom: 5%; left: 30%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    body::after {
      content: ''; position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      backdrop-filter: blur(12px);
      background: rgba(10,0,15,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo {
      font-family: 'Boogaloo', cursive; font-size: 1.6rem;
      letter-spacing: 0.02em; color: var(--white);
      display: flex; align-items: center; gap: 0.4rem;
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a {
      color: rgba(245,240,255,0.7); text-decoration: none;
      font-size: 0.9rem; font-weight: 300; letter-spacing: 0.06em;
      text-transform: uppercase; transition: color 0.25s; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; left: 0; bottom: -3px;
      width: 0; height: 1px; background: var(--accent); transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a:hover::after { width: 100%; }

    /* ── CONTACT PAGE ── */
    .contact-wrap {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 2rem 4rem;
    }

    .contact-inner {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column;
      align-items: center; gap: 2.5rem;
    }

    .contact-header {
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.8rem;
    }

    .contact-header h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2.5rem, 7vw, 4rem);
      line-height: 1;
      background: linear-gradient(90deg, #f5f0ff 0%, #e879f9 40%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s ease both;
    }

    .contact-header p {
      font-size: 0.95rem; font-weight: 300;
      color: rgba(245,240,255,0.5);
      letter-spacing: 0.04em;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .contact-divider {
      width: 48px; height: 2px; border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #e879f9);
    }

    /* ── FORM ── */
    .contact-form {
      width: 100%;
      display: flex; flex-direction: column; gap: 1.2rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,255,0.45);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(232,121,249,0.18);
      border-radius: 12px;
      padding: 0.85rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(245,240,255,0.25);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(232,121,249,0.5);
      background: rgba(124,58,237,0.14);
    }

    .form-group select option {
      background: #1e003a;
      color: var(--white);
    }

    .form-group textarea {
      min-height: 140px;
    }

    .btn-submit {
      width: 100%;
      padding: 0.95rem;
      border-radius: 999px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #e879f9);
      color: #fff;
      box-shadow: 0 0 30px rgba(232,121,249,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
      margin-top: 0.4rem;
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(232,121,249,0.5);
    }

    .form-note {
      font-size: 0.75rem;
      color: rgba(245,240,255,0.3);
      text-align: center;
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.4rem; }
      .nav-links { gap: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <nav>
    <a class="nav-logo" href="index.html">✦ <span>Welcome to the Alpha!</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>        
      <li><a href="alpharoom.html" class="active">Alpha Room Spaces</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="https://market.doginaldogs.com/" target="_blank">Doginal Dogs Market place</a></li>
      <li><a href="https://doginaldogs.com/join-the-community" target="_blank">Get A Starter Dog</a></li>
      
    </ul>
  </nav>

  <div class="contact-wrap">
    <div class="contact-inner">

      <div class="contact-header">
        <h1>Contact</h1>
        <p>Send a message and I'll get back to you.</p>
        <div class="contact-divider"></div>
      </div>

      <!-- Replace YOUR_FORM_ID with your Formspree form ID -->
      <form class="contact-form" action="https://formspree.io/f/mwvwodkv" method="POST">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <label for="subject">What are you writing about?</label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>Select a topic</option>
            <option value="Collaboration">Collaboration</option>
            <option value="NFT Project">NFT Project</option>
            <option value="Alpha Room">Alpha Room</option>
            <option value="Press / Media">Press / Media</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind..." required></textarea>
        </div>

        <!-- This hidden field tells Formspree where to send the email -->
        <input type="hidden" name="_replyto" value="noxismeta@gmail.com" />

        <button type="submit" class="btn-submit">Send Message ✦</button>

      

      </form>

    </div>
  </div>

</body>
</html>
