<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello, World ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:   #7c3aed;
      --mid:      #4c1d95;
      --dark:     #0a000f;
      --white:    #f5f0ff;
      --accent:   #e879f9;
      --accent2:  #67e8f9;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRADIENT CANVAS ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #6d28d9aa 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, #4c1d9588 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 55% 40%, #7c3aed44 0%, transparent 50%),
        linear-gradient(160deg, #3b0764 0%, #1e003a 40%, #0a000f 100%);
    }

    /* animated blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      z-index: 0;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: #7c3aed; top: -100px; left: -80px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #e879f9; top: 30%; right: -60px; animation-delay: -4s; }
    .blob-3 { width: 260px; height: 260px; background: #67e8f9; bottom: 5%; left: 30%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      backdrop-filter: blur(12px);
      background: rgba(10,0,15,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo {
      font-family: 'Boogaloo', cursive;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
    }
    .nav-links a {
      color: rgba(245,240,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.25s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -3px;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a:hover::after { width: 100%; }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 4rem;
    }

    /* floating deco stars */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d, 3s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50%      { opacity: var(--op, 0.8); transform: scale(1); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1.1rem;
      border: 1px solid rgba(232,121,249,0.4);
      border-radius: 999px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,121,249,0.08);
      margin-bottom: 2rem;
      animation: fadeUp 0.8s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(1.4); }
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 1.6rem;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    h1 .line { display: block; }
    h1 .shimmer {
      background: linear-gradient(90deg, #f5f0ff 0%, #e879f9 35%, #67e8f9 65%, #f5f0ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 0% center; }
      to   { background-position: 200% center; }
    }

    .sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: rgba(245,240,255,0.65);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 3rem;
      animation: fadeUp 0.9s 0.3s ease both;
    }
    .sub em { color: var(--accent2); font-style: normal; }

    .cta-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.9s 0.45s ease both;
    }

    .btn {
      padding: 0.85rem 2.2rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .btn:hover { transform: translateY(-3px); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #e879f9);
      color: #fff;
      border: none;
      box-shadow: 0 0 30px rgba(232,121,249,0.35);
    }
    .btn-primary:hover { box-shadow: 0 0 50px rgba(232,121,249,0.55); }

    .btn-ghost {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(245,240,255,0.25);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: rgba(245,240,255,0.35);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeUp 1s 0.8s ease both;
    }
    .scroll-arrow {
      width: 20px; height: 30px;
      border: 1.5px solid rgba(245,240,255,0.2);
      border-radius: 10px;
      position: relative;
    }
    .scroll-arrow::after {
      content: '';
      position: absolute;
      width: 4px; height: 6px;
      background: var(--accent);
      border-radius: 2px;
      top: 5px; left: 50%; transform: translateX(-50%);
      animation: scrollBob 1.6s ease-in-out infinite;
    }
    @keyframes scrollBob {
      0%,100% { top: 5px; opacity: 1; }
      80%      { top: 14px; opacity: 0; }
    }

    /* floating cards */
    .floaters {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .floater {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      background: rgba(124,58,237,0.12);
      padding: 0.8rem 1.2rem;
      font-size: 0.78rem;
      color: rgba(245,240,255,0.7);
      animation: floatCard var(--fd, 8s) ease-in-out var(--fdelay, 0s) infinite alternate;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .floater-icon { font-size: 1.2rem; }
    @keyframes floatCard {
      from { transform: translateY(0px) rotate(var(--fr, -2deg)); }
      to   { transform: translateY(-18px) rotate(var(--fr2, 2deg)); }
    }

    .floater-1 { top: 22%; left: 6%;  --fd: 7s; --fdelay: 0s;   --fr: -3deg; --fr2: 1deg; }
    .floater-2 { top: 55%; right: 5%; --fd: 9s; --fdelay: -3s;  --fr: 2deg;  --fr2: -2deg; }
    .floater-3 { bottom: 20%; left: 12%; --fd: 6s; --fdelay:-1.5s; --fr: 1deg; --fr2: -3deg; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 1rem 1.4rem; }
      .nav-links { gap: 1.2rem; }
      .floater { display: none; }
    }
  </style>
</head>
<body>

  <!-- Backgrounds -->
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Nav -->
  <nav>
    <div class="nav-logo">✦ <span>Nox is Meta</span></div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Alpha Room</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero">

    <!-- Twinkling stars -->
    <div class="stars" id="stars"></div>

    <!-- Floating pill cards -->
    <div class="floaters">
      <div class="floater floater-1"><span class="floater-icon">🎨</span> Community</div>
      <div class="floater floater-2"><span class="floater-icon">✨</span> Doginal Dogs</div>
      <div class="floater floater-3"><span class="floater-icon">🚀</span> The Alpha Room</div>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Launching Soon
    </div>

    <h1>
      <span class="line">Welcome</span>
    </h1>

    <p class="sub">
      Pardon our mess! <em>We are still creating</em>
    </p>

   

    <div class="scroll-hint">
      <div class="scroll-arrow"></div>
      Scroll
    </div>

  </section>

  <script>
    // Generate twinkling stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        --d:${2+Math.random()*4}s;
        --delay:${-Math.random()*5}s;
        --op:${0.4+Math.random()*0.6};
        width:${1+Math.random()*3}px;
        height:${1+Math.random()*3}px;
      `;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
