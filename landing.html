<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --star-color: #fff;
      --accent: #00e5ff;
      --accent2: #ff4fff;
      --glow: 0 0 30px #00e5ff88, 0 0 80px #00e5ff33;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Rajdhani', sans-serif;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
      z-index: 9999;
      mix-blend-mode: screen;
    }
    .cursor.grow { width: 36px; height: 36px; opacity: 0.5; }

    /* Canvas behind everything */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Nebula layers */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .nebula::before {
      content: '';
      position: absolute;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #1a0033cc 0%, transparent 70%);
      top: -10vw; left: -10vw;
      animation: driftA 30s ease-in-out infinite alternate;
    }
    .nebula::after {
      content: '';
      position: absolute;
      width: 50vw; height: 50vw;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #00102bbb 0%, transparent 70%);
      bottom: -5vw; right: -5vw;
      animation: driftB 25s ease-in-out infinite alternate;
    }
    @keyframes driftA { to { transform: translate(5vw, 8vw) scale(1.1); } }
    @keyframes driftB { to { transform: translate(-8vw, -5vw) scale(1.08); } }

    /* Center content */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    /* Planet / orb */
    .orb-wrap {
      position: relative;
      width: 160px; height: 160px;
      margin-bottom: 1rem;
    }
    .orb {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        #1e90ff 0%,
        #0a1f5c 40%,
        #000510 100%);
      box-shadow:
        0 0 40px #1e90ff55,
        0 0 100px #1e90ff22,
        inset -20px -20px 40px rgba(0,0,0,0.8),
        inset 10px 10px 20px rgba(100,180,255,0.15);
      animation: orbFloat 6s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-linear-gradient(
        -20deg,
        transparent,
        transparent 12px,
        rgba(255,255,255,0.03) 12px,
        rgba(255,255,255,0.03) 14px
      );
    }
    /* Ring */
    .ring {
      position: absolute;
      width: 240px; height: 60px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      border-radius: 50%;
      border: 2px solid rgba(0, 229, 255, 0.25);
      box-shadow: 0 0 20px rgba(0,229,255,0.15);
      animation: orbFloat 6s ease-in-out infinite;
      pointer-events: none;
    }
    .ring::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(255,79,255,0.15);
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    /* Title */
    .title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: var(--glow);
      animation: fadeSlideUp 1.2s ease both;
      animation-delay: 0.3s;
      opacity: 0;
    }
    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(0, 229, 255, 0.7);
      animation: fadeSlideUp 1.2s ease both;
      animation-delay: 0.6s;
      opacity: 0;
    }

    /* Divider */
    .divider {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      opacity: 0;
      animation: fadeSlideUp 1s ease both;
      animation-delay: 0.9s;
    }

    /* CTA Button */
    .btn-wrap {
      opacity: 0;
      animation: fadeSlideUp 1.2s ease both;
      animation-delay: 1.1s;
    }
    .btn {
      position: relative;
      display: inline-block;
      padding: 1rem 2.8rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 1px solid var(--accent);
      background: transparent;
      cursor: none;
      overflow: hidden;
      transition: color 0.3s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: #000; box-shadow: var(--glow); }
    .btn span { position: relative; z-index: 1; }

    /* Corner deco */
    .btn::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 10px; height: 10px;
      border-bottom: 1px solid var(--accent2);
      border-right: 1px solid var(--accent2);
    }

    /* Scanline pulse */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* Coords */
    .coords {
      position: fixed;
      bottom: 2rem; left: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(0,229,255,0.35);
      font-family: 'Rajdhani', monospace;
      z-index: 10;
      animation: blink 4s ease infinite;
    }
    .coords-right {
      position: fixed;
      bottom: 2rem; right: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(255,79,255,0.3);
      font-family: 'Rajdhani', monospace;
      z-index: 10;
      text-align: right;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="space"></canvas>
<div class="nebula"></div>
<div class="scanline"></div>



  <p class="subtitle">— Transmission sent........ —</p>
  <h1 class="title">Will You Answer?</h1>
  <div class="divider"></div>

  <div class="btn-wrap">
    <a href="index.html" class="btn"><span>Are You Ready To Enter</span></a>
  </div>
</div>

<div class="coords">
  LAT 27°42'N &nbsp; LON 88°21'W<br>
  ALT 384,400 km
</div>
<div class="coords-right">
  SIGNAL LOCKED<br>
  SYS ONLINE ▮
</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.querySelector('.btn').addEventListener('mouseenter', () => cursor.classList.add('grow'));
  document.querySelector('.btn').addEventListener('mouseleave', () => cursor.classList.remove('grow'));

  // Starfield
  const canvas = document.getElementById('space');
  const ctx = canvas.getContext('2d');

  let W, H, stars = [], shootingStars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();

  // Three layers of stars: background (slow, small), mid, foreground (fast, big)
  const LAYERS = [
    { count: 300, speed: 0.05, minR: 0.2, maxR: 0.6, alpha: 0.5 },
    { count: 150, speed: 0.15, minR: 0.5, maxR: 1.0, alpha: 0.75 },
    { count:  60, speed: 0.35, minR: 0.8, maxR: 1.5, alpha: 1.0 },
  ];

  function initStars() {
    stars = [];
    for (const layer of LAYERS) {
      for (let i = 0; i < layer.count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: layer.minR + Math.random() * (layer.maxR - layer.minR),
          speed: layer.speed * (0.7 + Math.random() * 0.6),
          alpha: layer.alpha * (0.5 + Math.random() * 0.5),
          twinkle: Math.random() * Math.PI * 2,
          twinkleSpeed: 0.01 + Math.random() * 0.03,
        });
      }
    }
  }
  initStars();

  function spawnShootingStar() {
    const fromTop = Math.random() < 0.5;
    shootingStars.push({
      x:  fromTop ? Math.random() * W : 0,
      y:  fromTop ? 0 : Math.random() * H * 0.5,
      vx: 3 + Math.random() * 5,
      vy: 1.5 + Math.random() * 3,
      len: 80 + Math.random() * 120,
      alpha: 1,
      life: 1,
    });
  }

  setInterval(spawnShootingStar, 2800);

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Stars
    for (const s of stars) {
      s.twinkle += s.twinkleSpeed;
      const a = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();

      // Move downward (warp-scroll feel)
      s.y += s.speed;
      if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
    }

    // Shooting stars
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.len, s.y - s.len * 0.4);
      grad.addColorStop(0, `rgba(200,240,255,${s.alpha})`);
      grad.addColorStop(1, 'rgba(200,240,255,0)');
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.len, s.y - s.len * 0.4);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      s.x += s.vx;
      s.y += s.vy;
      s.alpha -= 0.012;
      if (s.alpha <= 0 || s.x > W + 100 || s.y > H + 100) shootingStars.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
