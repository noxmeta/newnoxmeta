<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Update Space Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --purple:#7c3aed; --dark:#0a000f; --white:#f5f0ff; --accent:#e879f9; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark); color: var(--white);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #6d28d9aa 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, #4c1d9588 0%, transparent 55%),
        linear-gradient(160deg, #3b0764 0%, #1e003a 40%, #0a000f 100%);
    }
    .blob { position:fixed; border-radius:50%; filter:blur(70px); opacity:0.3; z-index:0; animation:drift 14s ease-in-out infinite alternate; }
    .blob-1 { width:340px; height:340px; background:#7c3aed; top:-80px; left:-60px; }
    .blob-2 { width:240px; height:240px; background:#e879f9; bottom:10%; right:-40px; animation-delay:-4s; }
    @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(20px,15px) scale(1.06)} }
    .card {
      position:relative; z-index:10; width:100%; max-width:420px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
      border-radius:20px; padding:36px 28px;
      backdrop-filter:blur(16px); box-shadow:0 8px 40px rgba(0,0,0,0.5);
    }
    .card-header { display:flex; flex-direction:column; align-items:center; gap:0.5rem; margin-bottom:2rem; text-align:center; }
    .badge {
      display:inline-flex; align-items:center; gap:0.5rem;
      padding:0.35rem 1rem; border:1px solid rgba(232,121,249,0.4);
      border-radius:999px; font-size:0.72rem; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--accent); background:rgba(232,121,249,0.08); margin-bottom:0.5rem;
    }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }
    h1 { font-family:'Boogaloo',cursive; font-size:1.8rem; color:var(--white); }
    p.sub { font-size:0.82rem; font-weight:300; color:rgba(245,240,255,0.4); letter-spacing:0.04em; }
    label { display:block; font-size:0.7rem; color:rgba(245,240,255,0.45); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
    .field { margin-bottom:20px; }
    input[type="password"], input[type="url"] {
      width:100%; padding:13px 16px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05);
      color:var(--white); font-size:15px; font-family:'DM Sans',sans-serif;
      outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color:rgba(245,240,255,0.25); }
    input:focus { border-color:rgba(232,121,249,0.5); box-shadow:0 0 0 3px rgba(232,121,249,0.1); }
    button {
      width:100%; padding:14px; border-radius:12px; border:none;
      background:linear-gradient(135deg,#7c3aed,#e879f9);
      color:#fff; font-size:15px; font-weight:600; font-family:'DM Sans',sans-serif;
      letter-spacing:0.04em; cursor:pointer; transition:opacity 0.2s, transform 0.15s;
    }
    button:hover:not(:disabled) { opacity:0.9; transform:translateY(-1px); }
    button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    #status { margin-top:14px; font-size:13px; text-align:center; min-height:18px; font-weight:300; }
    .success { color:#a3e635; }
    .error   { color:#f87171; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="card-header">
      <div class="badge"><span class="badge-dot"></span>Admin</div>
      <h1>Update Space Link</h1>
      <p class="sub">Paste today's X Space URL and save</p>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter admin password" />
    </div>
    <div class="field">
      <label>X Space URL</label>
      <input type="url" id="spaceUrl" placeholder="https://x.com/i/spaces/..." />
    </div>
    <button id="saveBtn" onclick="saveLink()">Save Link</button>
    <div id="status"></div>
  </div>

  <script>
    // ── CONFIGURE THESE ──────────────────────────
    const BIN_ID   = "69cf01c8856a682189f4b92d";
    const API_KEY  = "$2a$10$a7zEyQp9M56DZlMF7e0dj.gUAYPvAy9jtJ1vOscH62MAEra/dxEfK";
    const PASSWORD = "S3064138#";
    // ─────────────────────────────────────────────

    async function saveLink() {
      const password = document.getElementById('password').value.trim();
      const url      = document.getElementById('spaceUrl').value.trim();
      const status   = document.getElementById('status');
      const btn      = document.getElementById('saveBtn');
      status.textContent = ''; status.className = '';
      if (password !== PASSWORD) { status.textContent = '❌ Incorrect password.'; status.className = 'error'; return; }
      if (!url.startsWith('http')) { status.textContent = '❌ Please enter a valid URL.'; status.className = 'error'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body: JSON.stringify({ url })
        });
        if (!res.ok) throw new Error();
        status.textContent = '✅ Link updated! Card goes live at 8 PM EST.';
        status.className = 'success';
        document.getElementById('spaceUrl').value = '';
      } catch {
        status.textContent = '❌ Something went wrong. Check your Bin ID and API key.';
        status.className = 'error';
      }
      btn.disabled = false; btn.textContent = 'Save Link';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') saveLink(); });
  </script>
</body>
</html>
